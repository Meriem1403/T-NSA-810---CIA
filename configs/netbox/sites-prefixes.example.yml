# Modèle de données IPAM — sans secrets. Importer via script ou playbook.
sites:
  - name: site1-onprem
    slug: site1
    description: Site principal on-prem
  - name: site2-remote
    slug: site2
    description: Site distant Proxmox (labo)

prefixes:
  - site: site1
    prefix: 192.168.199.0/24
    status: active
    description: LAN site 1
  - site: site2
    prefix: 192.168.10.0/24
    status: active
    description: LAN site 2 (pfSense LAN)
  - site: site2
    prefix: 192.168.102.0/24
    status: active
    description: WAN uplink / Proxmox management S2
  - site: site2
    prefix: 10.8.0.0/24
    status: active
    description: OpenVPN tunnel

ip_addresses:
  - address: 192.168.10.1/24
    dns_name: fw.site2.local
    description: pfSense LAN S2
  - address: 192.168.10.10/24
    dns_name: client1.site2.local
    description: VM101 Windows
  - address: 192.168.10.11/24
    dns_name: bastion.site2.local
    description: VM102 bastion + nginx
