# NetBox — site S1 (VM svc-s1). Secrets via .env (non versionné).
services:
  postgres:
    image: postgres:16-alpine
    env_file: .env
    environment:
      POSTGRES_DB: ${NETBOX_DB_NAME:-netbox}
      POSTGRES_USER: ${NETBOX_DB_USER:-netbox}
      POSTGRES_PASSWORD: ${NETBOX_DB_PASSWORD}
    volumes:
      - netbox-postgres:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${NETBOX_DB_USER:-netbox}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  netbox:
    image: netboxcommunity/netbox:v4.1
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env
    environment:
      DB_HOST: postgres
      DB_NAME: ${NETBOX_DB_NAME:-netbox}
      DB_USER: ${NETBOX_DB_USER:-netbox}
      DB_PASSWORD: ${NETBOX_DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SECRET_KEY: ${NETBOX_SECRET_KEY}
      SUPERUSER_NAME: ${NETBOX_SUPERUSER:-admin}
      SUPERUSER_EMAIL: ${NETBOX_SUPERUSER_EMAIL:-admin@cia.local}
      SUPERUSER_PASSWORD: ${NETBOX_SUPERUSER_PASSWORD}
      ALLOWED_HOSTS: ${NETBOX_ALLOWED_HOSTS:-*}
    ports:
      - "${NETBOX_HTTP_PORT:-8080}:8080"
    volumes:
      - netbox-media:/opt/netbox/netbox/media
    restart: unless-stopped

volumes:
  netbox-postgres:
  netbox-media:
